<svg width="860" height="320" viewBox="0 0 860 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <marker id="a1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#10b981"/></marker>
    <marker id="a3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/></marker>
    <filter id="g1"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="860" height="320" fill="url(#bg)" rx="16"/>
  <text x="430" y="26" font-family="Arial" font-size="12" fill="#64748b" text-anchor="middle" letter-spacing="3" font-weight="600">REAL-TIME TRACKING  ·  SOCKET.IO ROOM ARCHITECTURE</text>

  <!-- Driver App -->
  <rect x="30" y="55" width="140" height="100" rx="12" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
  <text x="100" y="82" font-family="Arial" font-size="20" text-anchor="middle">🛵</text>
  <text x="100" y="100" font-family="Arial" font-size="10" fill="#fb923c" text-anchor="middle" font-weight="700">DRIVER APP</text>
  <text x="100" y="114" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">socket.emit(</text>
  <text x="100" y="126" font-family="monospace" font-size="7" fill="#fbbf24" text-anchor="middle">'driver:location'</text>
  <text x="100" y="138" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">{lat, lng, speed}</text>

  <!-- GPS pulse animation from driver -->
  <circle cx="100" cy="105" r="8" fill="none" stroke="#f97316" stroke-width="1.5">
    <animate attributeName="r" values="8;22;8" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Arrow driver to server -->
  <line x1="172" y1="105" x2="268" y2="105" stroke="#f97316" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#a3)"/>
  <circle r="4" fill="#f97316">
    <animateMotion dur="1.5s" repeatCount="indefinite" path="M 172,105 L 268,105"/>
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- API Server / Socket.io hub -->
  <rect x="270" y="42" width="200" height="236" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="270" y="42" width="200" height="32" rx="12" fill="#1e3a5f"/>
  <text x="370" y="63" font-family="Arial" font-size="11" fill="#60a5fa" text-anchor="middle" font-weight="700">🔌 SOCKET.IO SERVER</text>

  <!-- Room boxes inside server -->
  <rect x="284" y="84" width="172" height="44" rx="8" fill="#0f172a"/>
  <text x="370" y="102" font-family="monospace" font-size="9" fill="#3b82f6" text-anchor="middle" font-weight="700">room: store:{storeId}</text>
  <text x="370" y="117" font-family="monospace" font-size="7" fill="#475569" text-anchor="middle">owner dashboard + new orders + driver updates</text>

  <rect x="284" y="136" width="172" height="44" rx="8" fill="#0f172a"/>
  <text x="370" y="154" font-family="monospace" font-size="9" fill="#f97316" text-anchor="middle" font-weight="700">room: driver:{driverId}</text>
  <text x="370" y="169" font-family="monospace" font-size="7" fill="#475569" text-anchor="middle">assignments + batch updates</text>

  <rect x="284" y="188" width="172" height="44" rx="8" fill="#0f172a"/>
  <text x="370" y="206" font-family="monospace" font-size="9" fill="#fbbf24" text-anchor="middle" font-weight="700">room: order:{orderId}</text>
  <text x="370" y="221" font-family="monospace" font-size="7" fill="#475569" text-anchor="middle">public tracking · no auth needed</text>

  <text x="370" y="252" font-family="monospace" font-size="7" fill="#475569" text-anchor="middle">JWT verified in handshake.auth</text>
  <text x="370" y="264" font-family="monospace" font-size="7" fill="#475569" text-anchor="middle">transport: websocket + polling</text>

  <!-- Broadcast arrows to right -->
  <!-- To owner app -->
  <line x1="472" y1="106" x2="558" y2="90" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#a1)"/>
  <!-- To tracking PWA -->
  <line x1="472" y1="160" x2="558" y2="180" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#a3)"/>
  <!-- To driver app back -->
  <line x1="472" y1="206" x2="558" y2="260" stroke="#10b981" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#a2)"/>

  <!-- Animated packets outward -->
  <circle r="4" fill="#3b82f6">
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="0.2s" path="M 472,106 L 558,90"/>
    <animate attributeName="opacity" values="1;0;1" dur="1.8s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <circle r="4" fill="#fbbf24">
    <animateMotion dur="2s" repeatCount="indefinite" begin="0.6s" path="M 472,160 L 558,180"/>
    <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  <circle r="4" fill="#10b981">
    <animateMotion dur="2.2s" repeatCount="indefinite" begin="1s" path="M 472,206 L 558,260"/>
    <animate attributeName="opacity" values="1;0;1" dur="2.2s" repeatCount="indefinite" begin="1s"/>
  </circle>

  <!-- Owner App -->
  <rect x="560" y="55" width="140" height="80" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="630" y="80" font-family="Arial" font-size="20" text-anchor="middle">🏪</text>
  <text x="630" y="98" font-family="Arial" font-size="10" fill="#60a5fa" text-anchor="middle" font-weight="700">OWNER APP</text>
  <text x="630" y="112" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">live driver pins</text>
  <text x="630" y="124" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">order status realtime</text>

  <!-- Tracking PWA -->
  <rect x="560" y="155" width="140" height="80" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="630" y="180" font-family="Arial" font-size="20" text-anchor="middle">📍</text>
  <text x="630" y="198" font-family="Arial" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="700">TRACKING PWA</text>
  <text x="630" y="212" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">Leaflet map · ETA</text>
  <text x="630" y="225" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">no auth · public link</text>

  <!-- Customer Mobile -->
  <rect x="560" y="250" width="140" height="55" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="630" y="272" font-family="Arial" font-size="18" text-anchor="middle">👤</text>
  <text x="630" y="289" font-family="Arial" font-size="10" fill="#34d399" text-anchor="middle" font-weight="700">CUSTOMER</text>
  <text x="630" y="300" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">opens link, sees map</text>

  <!-- Event labels on lines -->
  <text x="220" y="98" font-family="monospace" font-size="7" fill="#f97316" text-anchor="middle">location update</text>

  <!-- Bottom: event types list -->
  <rect x="30" y="200" width="220" height="100" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="140" y="220" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle" font-weight="700">EMITTED EVENTS</text>
  <text x="44" y="236" font-family="monospace" font-size="7" fill="#60a5fa">order:new          → store:{id}</text>
  <text x="44" y="250" font-family="monospace" font-size="7" fill="#34d399">order:status_update → store + order</text>
  <text x="44" y="264" font-family="monospace" font-size="7" fill="#fb923c">driver:location    → store + order</text>
  <text x="44" y="278" font-family="monospace" font-size="7" fill="#fbbf24">batch:started      → driver:{id}</text>
  <text x="44" y="292" font-family="monospace" font-size="7" fill="#c4b5fd">forecast:ready     → store:{id}</text>

  <!-- Ticker animation -->
  <rect x="730" y="55" width="110" height="250" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="785" y="74" font-family="monospace" font-size="8" fill="#64748b" text-anchor="middle" font-weight="700">LIVE EVENTS</text>
  <g>
    <text x="744" y="94" font-family="monospace" font-size="6" fill="#10b981">● order:new</text>
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite" begin="0s"/>
  </g>
  <text x="744" y="110" font-family="monospace" font-size="6" fill="#60a5fa">● driver:location</text>
  <text x="744" y="126" font-family="monospace" font-size="6" fill="#f97316">● order:status</text>
  <text x="744" y="142" font-family="monospace" font-size="6" fill="#fbbf24">● batch:started</text>
  <text x="744" y="158" font-family="monospace" font-size="6" fill="#c4b5fd">● forecast:ready</text>
  <text x="744" y="174" font-family="monospace" font-size="6" fill="#10b981">● order:delivered</text>
  <!-- blinking cursor -->
  <rect x="744" y="180" width="6" height="10" fill="#3b82f6">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  <text x="785" y="215" font-family="monospace" font-size="7" fill="#475569" text-anchor="middle">JWT auth</text>
  <text x="785" y="228" font-family="monospace" font-size="7" fill="#475569" text-anchor="middle">handshake</text>
  <text x="785" y="241" font-family="monospace" font-size="7" fill="#3b82f6" text-anchor="middle">ws:// + poll</text>
  <text x="785" y="256" font-family="monospace" font-size="7" fill="#475569" text-anchor="middle">fallback</text>
  <text x="785" y="290" font-family="monospace" font-size="7" fill="#10b981" text-anchor="middle">✓ connected</text>
</svg>
