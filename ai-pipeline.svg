<svg width="860" height="300" viewBox="0 0 860 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="claude" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4c1d95"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <marker id="ap" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b5cf6"/>
    </marker>
    <filter id="gp"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="860" height="300" fill="url(#bg)" rx="16"/>
  <text x="430" y="26" font-family="Arial" font-size="12" fill="#64748b" text-anchor="middle" letter-spacing="3" font-weight="600">AI PIPELINE  ·  DEMAND FORECASTING  +  INSIGHTS  ·  BULL QUEUE</text>

  <!-- Step 1: Bull Queue / Cron -->
  <rect x="20" y="55" width="130" height="90" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="85" y="78" font-family="Arial" font-size="18" text-anchor="middle">⏰</text>
  <text x="85" y="96" font-family="Arial" font-size="9" fill="#f87171" text-anchor="middle" font-weight="700">BULL QUEUE</text>
  <text x="85" y="110" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">demand-forecast</text>
  <text x="85" y="122" font-family="monospace" font-size="7" fill="#fbbf24" text-anchor="middle">cron: 0 23 * * *</text>
  <text x="85" y="134" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">nightly 11 PM IST</text>
  <!-- pulsing clock -->
  <circle cx="85" cy="100" r="38" fill="none" stroke="#ef4444" stroke-width="1">
    <animate attributeName="r" values="38;50;38" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Arrow 1 -->
  <line x1="152" y1="100" x2="195" y2="100" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#ap)"/>
  <circle r="3" fill="#8b5cf6">
    <animateMotion dur="1.5s" repeatCount="indefinite" path="M 152,100 L 195,100"/>
  </circle>

  <!-- Step 2: DB Query -->
  <rect x="198" y="55" width="130" height="90" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="263" y="78" font-family="Arial" font-size="18" text-anchor="middle">🐘</text>
  <text x="263" y="96" font-family="Arial" font-size="9" fill="#34d399" text-anchor="middle" font-weight="700">POSTGRES QUERY</text>
  <text x="263" y="110" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">last 90 days</text>
  <text x="263" y="122" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">delivered orders</text>
  <text x="263" y="134" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">grouped by SKU</text>

  <!-- Arrow 2 -->
  <line x1="330" y1="100" x2="373" y2="100" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#ap)"/>
  <circle r="3" fill="#8b5cf6">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="0.5s" path="M 330,100 L 373,100"/>
  </circle>

  <!-- Step 3: Claude API -->
  <rect x="376" y="42" width="160" height="116" rx="12" fill="url(#claude)" stroke="#a78bfa" stroke-width="2" filter="url(#gp)"/>
  <text x="456" y="66" font-family="Arial" font-size="20" text-anchor="middle">🤖</text>
  <text x="456" y="84" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="800">CLAUDE AI</text>
  <text x="456" y="98" font-family="monospace" font-size="7" fill="#c4b5fd" text-anchor="middle">claude-sonnet-4-20250514</text>
  <text x="456" y="112" font-family="monospace" font-size="7" fill="#ddd6fe" text-anchor="middle">system: inventory analyst</text>
  <text x="456" y="126" font-family="monospace" font-size="7" fill="#ddd6fe" text-anchor="middle">context: 90d sales data</text>
  <text x="456" y="140" font-family="monospace" font-size="7" fill="#ddd6fe" text-anchor="middle">max_tokens: 1000</text>
  <!-- orbiting dot -->
  <circle r="4" fill="#e9d5ff">
    <animateMotion dur="3s" repeatCount="indefinite"
      path="M 80,0 A 80,50 0 1,1 -80,0 A 80,50 0 1,1 80,0">
      <animateTransform attributeName="transform" type="translate" values="456,100" additive="sum"/>
    </animateMotion>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Arrow 3 -->
  <line x1="538" y1="100" x2="581" y2="100" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#ap)"/>
  <circle r="3" fill="#c4b5fd">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="1s" path="M 538,100 L 581,100"/>
  </circle>

  <!-- Step 4: Parse & Store -->
  <rect x="584" y="55" width="130" height="90" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="649" y="78" font-family="Arial" font-size="18" text-anchor="middle">💾</text>
  <text x="649" y="96" font-family="Arial" font-size="9" fill="#60a5fa" text-anchor="middle" font-weight="700">PARSE + STORE</text>
  <text x="649" y="110" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">DemandForecast.create</text>
  <text x="649" y="122" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">per SKU per day</text>
  <text x="649" y="134" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">confidenceScore stored</text>

  <!-- Arrow 4 -->
  <line x1="716" y1="100" x2="759" y2="100" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#ap)"/>
  <circle r="3" fill="#8b5cf6">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="1.5s" path="M 716,100 L 759,100"/>
  </circle>

  <!-- Step 5: Mobile app -->
  <rect x="762" y="55" width="80" height="90" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="802" y="78" font-family="Arial" font-size="18" text-anchor="middle">📱</text>
  <text x="802" y="96" font-family="Arial" font-size="9" fill="#fbbf24" text-anchor="middle" font-weight="700">APP</text>
  <text x="802" y="110" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">ForecastScreen</text>
  <text x="802" y="122" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">urgency chips</text>
  <text x="802" y="134" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">restock alerts</text>

  <!-- 4 AI functions below -->
  <text x="430" y="186" font-family="Arial" font-size="11" fill="#94a3b8" text-anchor="middle" font-weight="600">CLAUDE SERVICE FUNCTIONS</text>

  <rect x="20" y="200" width="190" height="70" rx="10" fill="#0f172a" stroke="#7c3aed" stroke-width="1"/>
  <text x="115" y="220" font-family="monospace" font-size="8" fill="#c4b5fd" text-anchor="middle" font-weight="700">parseWhatsAppOrder()</text>
  <text x="115" y="234" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">Hindi/English/Hinglish NLP</text>
  <text x="115" y="247" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">→ structured {items, qty}</text>
  <text x="115" y="260" font-family="monospace" font-size="7" fill="#475569" text-anchor="middle">fallback mock in dev</text>

  <rect x="222" y="200" width="190" height="70" rx="10" fill="#0f172a" stroke="#7c3aed" stroke-width="1"/>
  <text x="317" y="220" font-family="monospace" font-size="8" fill="#c4b5fd" text-anchor="middle" font-weight="700">generateDemandForecast()</text>
  <text x="317" y="234" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">90d sales → 7d prediction</text>
  <text x="317" y="247" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">→ qty + confidence + urgency</text>
  <text x="317" y="260" font-family="monospace" font-size="7" fill="#475569" text-anchor="middle">4 urgency levels</text>

  <rect x="424" y="200" width="190" height="70" rx="10" fill="#0f172a" stroke="#7c3aed" stroke-width="1"/>
  <text x="519" y="220" font-family="monospace" font-size="8" fill="#c4b5fd" text-anchor="middle" font-weight="700">generateDailyReport()</text>
  <text x="519" y="234" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">orders + revenue rollup</text>
  <text x="519" y="247" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">→ StoreMetric record</text>
  <text x="519" y="260" font-family="monospace" font-size="7" fill="#475569" text-anchor="middle">daily Bull job</text>

  <rect x="626" y="200" width="212" height="70" rx="10" fill="#0f172a" stroke="#7c3aed" stroke-width="1"/>
  <text x="732" y="220" font-family="monospace" font-size="8" fill="#c4b5fd" text-anchor="middle" font-weight="700">generateWeeklyInsights()</text>
  <text x="732" y="234" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">peak hours + top products</text>
  <text x="732" y="247" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">→ suggestions array</text>
  <text x="732" y="260" font-family="monospace" font-size="7" fill="#475569" text-anchor="middle">InsightsScreen</text>
</svg>
