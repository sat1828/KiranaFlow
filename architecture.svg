<svg width="860" height="420" viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arr-wa" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#25D366"/>
    </marker>
  </defs>

  <rect width="860" height="420" fill="url(#bg)" rx="16"/>

  <!-- title -->
  <text x="430" y="30" font-family="Arial" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="600" letter-spacing="2">SYSTEM ARCHITECTURE</text>

  <!-- ═══ ROW 1: Clients ═══ -->

  <!-- WhatsApp Customer -->
  <rect x="20" y="55" width="120" height="80" rx="12" fill="#1e293b" stroke="#25D366" stroke-width="1.5"/>
  <text x="80" y="80" font-family="Arial" font-size="18" text-anchor="middle">📱</text>
  <text x="80" y="98" font-family="Arial" font-size="10" fill="#25D366" text-anchor="middle" font-weight="700">CUSTOMER</text>
  <text x="80" y="112" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">WhatsApp</text>
  <text x="80" y="124" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">Hindi / Hinglish</text>

  <!-- Owner App -->
  <rect x="20" y="170" width="120" height="80" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="195" font-family="Arial" font-size="18" text-anchor="middle">🏪</text>
  <text x="80" y="213" font-family="Arial" font-size="10" fill="#60a5fa" text-anchor="middle" font-weight="700">OWNER APP</text>
  <text x="80" y="227" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">React Native</text>
  <text x="80" y="239" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">Expo 51</text>

  <!-- Driver App -->
  <rect x="20" y="285" width="120" height="80" rx="12" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
  <text x="80" y="310" font-family="Arial" font-size="18" text-anchor="middle">🛵</text>
  <text x="80" y="328" font-family="Arial" font-size="10" fill="#fb923c" text-anchor="middle" font-weight="700">DRIVER APP</text>
  <text x="80" y="342" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">React Native</text>
  <text x="80" y="354" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">Same APK</text>

  <!-- Animated flow dots - WhatsApp to API -->
  <circle r="4" fill="#25D366" opacity="0.9">
    <animateMotion dur="2s" repeatCount="indefinite" path="M 140,95 L 270,150"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#3b82f6" opacity="0.9">
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="0.5s" path="M 140,210 L 270,195"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle r="4" fill="#f97316" opacity="0.9">
    <animateMotion dur="2.2s" repeatCount="indefinite" begin="1s" path="M 140,325 L 270,230"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite" begin="1s"/>
  </circle>

  <!-- Lines from clients to API -->
  <line x1="142" y1="95" x2="270" y2="150" stroke="#25D366" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.6" marker-end="url(#arr-wa)"/>
  <line x1="142" y1="210" x2="270" y2="195" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.6" marker-end="url(#arr-blue)"/>
  <line x1="142" y1="325" x2="270" y2="230" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.6" marker-end="url(#arr-amber)"/>

  <!-- ═══ API SERVER (CENTER) ═══ -->
  <rect x="270" y="80" width="200" height="230" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="270" y="80" width="200" height="40" rx="12" fill="#1e3a5f"/>
  <text x="370" y="98" font-family="Arial" font-size="11" fill="#60a5fa" text-anchor="middle" font-weight="700">⚙️ API SERVER</text>
  <text x="370" y="113" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">Node.js 20 · Express 4</text>

  <!-- Internal modules -->
  <rect x="282" y="130" width="80" height="22" rx="6" fill="#0f172a"/><text x="322" y="145" font-family="monospace" font-size="8" fill="#60a5fa" text-anchor="middle">JWT Auth</text>
  <rect x="370" y="130" width="88" height="22" rx="6" fill="#0f172a"/><text x="414" y="145" font-family="monospace" font-size="8" fill="#34d399" text-anchor="middle">Socket.io 4</text>
  <rect x="282" y="158" width="80" height="22" rx="6" fill="#0f172a"/><text x="322" y="173" font-family="monospace" font-size="8" fill="#fbbf24" text-anchor="middle">Bull Queue</text>
  <rect x="370" y="158" width="88" height="22" rx="6" fill="#0f172a"/><text x="414" y="173" font-family="monospace" font-size="8" fill="#f87171" text-anchor="middle">Rate Limiter</text>
  <rect x="282" y="186" width="80" height="22" rx="6" fill="#0f172a"/><text x="322" y="201" font-family="monospace" font-size="8" fill="#a78bfa" text-anchor="middle">Prisma ORM</text>
  <rect x="370" y="186" width="88" height="22" rx="6" fill="#0f172a"/><text x="414" y="201" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">Helmet + CORS</text>
  <rect x="282" y="214" width="176" height="22" rx="6" fill="#0f172a"/><text x="370" y="229" font-family="monospace" font-size="8" fill="#64748b" text-anchor="middle">Winston · Morgan · Compression</text>
  <rect x="282" y="242" width="176" height="22" rx="6" fill="#1e3a5f"/><text x="370" y="257" font-family="monospace" font-size="8" fill="#60a5fa" text-anchor="middle">10 Route Modules</text>
  <text x="370" y="272" font-family="monospace" font-size="7" fill="#475569" text-anchor="middle">auth·store·order·driver·route·inventory·ai·report·webhook·track</text>
  <text x="370" y="296" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">forecast.job 23:00 · report.job daily</text>

  <!-- Lines from API to right services -->
  <line x1="470" y1="140" x2="540" y2="100" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-purple)"/>
  <line x1="470" y1="170" x2="540" y2="200" stroke="#25D366" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-wa)"/>
  <line x1="470" y1="200" x2="540" y2="300" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-amber)"/>
  <line x1="470" y1="230" x2="540" y2="375" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-blue)"/>

  <!-- Line API to DB/Redis -->
  <line x1="370" y1="310" x2="370" y2="358" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-green)"/>

  <!-- ═══ RIGHT SERVICES ═══ -->

  <!-- Claude AI -->
  <rect x="540" y="55" width="150" height="90" rx="12" fill="#2e1065" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="615" y="80" font-family="Arial" font-size="10" fill="#c4b5fd" text-anchor="middle" font-weight="700">🤖 CLAUDE AI</text>
  <text x="615" y="96" font-family="Arial" font-size="8" fill="#7c3aed" text-anchor="middle">claude-sonnet-4-20250514</text>
  <text x="615" y="110" font-family="Arial" font-size="8" fill="#94a3b8" text-anchor="middle">Order Parse · Forecast</text>
  <text x="615" y="123" font-family="Arial" font-size="8" fill="#94a3b8" text-anchor="middle">Daily Report · Insights</text>

  <!-- Animated pulse on Claude -->
  <circle cx="615" cy="100" r="55" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.2">
    <animate attributeName="r" values="50;65;50" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- WhatsApp / Twilio -->
  <rect x="540" y="170" width="150" height="70" rx="12" fill="#1e293b" stroke="#25D366" stroke-width="1.5"/>
  <text x="615" y="195" font-family="Arial" font-size="10" fill="#25D366" text-anchor="middle" font-weight="700">💬 TWILIO</text>
  <text x="615" y="210" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">WhatsApp Business API</text>
  <text x="615" y="224" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">Webhook · Signature Verify</text>

  <!-- Google Route -->
  <rect x="540" y="270" width="150" height="70" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="615" y="295" font-family="Arial" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="700">🗺️ GOOGLE</text>
  <text x="615" y="310" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">Route Optimization API</text>
  <text x="615" y="324" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">VRP · Weight Limits</text>

  <!-- Tracking PWA -->
  <rect x="540" y="365" width="150" height="42" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="615" y="382" font-family="Arial" font-size="9" fill="#fbbf24" text-anchor="middle" font-weight="700">📍 TRACKING PWA</text>
  <text x="615" y="396" font-family="Arial" font-size="7" fill="#64748b" text-anchor="middle">Next.js 14 · Leaflet · Public</text>

  <!-- ═══ DATABASES ═══ -->
  <rect x="270" y="358" width="94" height="42" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="317" y="376" font-family="monospace" font-size="8" fill="#34d399" text-anchor="middle" font-weight="700">🐘 PostgreSQL 16</text>
  <text x="317" y="390" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">13 models · Prisma</text>

  <rect x="374" y="358" width="94" height="42" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="421" y="376" font-family="monospace" font-size="8" fill="#f87171" text-anchor="middle" font-weight="700">⚡ Redis 7</text>
  <text x="421" y="390" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">Bull · Rate Limit</text>

  <!-- pgAdmin -->
  <rect x="702" y="55" width="130" height="42" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="767" y="73" font-family="monospace" font-size="8" fill="#64748b" text-anchor="middle">pgAdmin 4</text>
  <text x="767" y="87" font-family="monospace" font-size="7" fill="#475569" text-anchor="middle">localhost:5050</text>

  <!-- Docker compose label -->
  <rect x="702" y="115" width="130" height="58" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="767" y="134" font-family="monospace" font-size="8" fill="#60a5fa" text-anchor="middle" font-weight="700">🐋 docker-compose</text>
  <text x="767" y="148" font-family="monospace" font-size="7" fill="#475569" text-anchor="middle">postgres:16-alpine</text>
  <text x="767" y="161" font-family="monospace" font-size="7" fill="#475569" text-anchor="middle">redis:7-alpine</text>
  <text x="767" y="174" font-family="monospace" font-size="7" fill="#475569" text-anchor="middle">node api + pgadmin</text>

  <!-- Socket rooms label -->
  <rect x="702" y="195" width="130" height="78" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="767" y="213" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle" font-weight="700">Socket.io Rooms</text>
  <text x="767" y="228" font-family="monospace" font-size="7" fill="#60a5fa" text-anchor="middle">store:{id}</text>
  <text x="767" y="242" font-family="monospace" font-size="7" fill="#fb923c" text-anchor="middle">driver:{id}</text>
  <text x="767" y="256" font-family="monospace" font-size="7" fill="#fbbf24" text-anchor="middle">order:{id}</text>
  <text x="767" y="268" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">JWT auth middleware</text>

  <!-- Animated data packets Claude -->
  <circle r="3" fill="#8b5cf6">
    <animateMotion dur="2.5s" repeatCount="indefinite" begin="0.3s" path="M 470,140 L 540,100"/>
    <animate attributeName="opacity" values="1;0;1" dur="2.5s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <!-- Animated data packets Twilio -->
  <circle r="3" fill="#25D366">
    <animateMotion dur="3s" repeatCount="indefinite" begin="1.2s" path="M 470,170 L 540,205"/>
    <animate attributeName="opacity" values="1;0;1" dur="3s" repeatCount="indefinite" begin="1.2s"/>
  </circle>
</svg>
