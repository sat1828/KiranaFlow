<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)"/>

  <!-- Animated orb 1 -->
  <circle cx="120" cy="80" r="90" fill="#3b82f6" opacity="0.06">
    <animate attributeName="r" values="90;110;90" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.06;0.1;0.06" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- Animated orb 2 -->
  <circle cx="780" cy="220" r="100" fill="#10b981" opacity="0.06">
    <animate attributeName="r" values="100;120;100" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="780;800;780" dur="10s" repeatCount="indefinite"/>
  </circle>

  <!-- Animated orb 3 -->
  <circle cx="450" cy="40" r="70" fill="#8b5cf6" opacity="0.05">
    <animate attributeName="cy" values="40;60;40" dur="12s" repeatCount="indefinite"/>
  </circle>

  <!-- Grid lines -->
  <line x1="0" y1="100" x2="900" y2="100" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="200" x2="900" y2="200" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  <line x1="225" y1="0" x2="225" y2="300" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  <line x1="450" y1="0" x2="450" y2="300" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  <line x1="675" y1="0" x2="675" y2="300" stroke="#334155" stroke-width="0.5" opacity="0.3"/>

  <!-- Floating stat card 1 -->
  <g filter="url(#softglow)">
    <rect x="30" y="60" width="155" height="70" rx="14" fill="#1e293b" stroke="#3b82f6" stroke-width="1" opacity="0.9">
      <animate attributeName="y" values="60;50;60" dur="5s" repeatCount="indefinite"/>
    </rect>
    <text x="50" y="86" font-family="monospace" font-size="10" fill="#64748b">
      <animate attributeName="y" values="86;76;86" dur="5s" repeatCount="indefinite"/>
      TODAY'S ORDERS
    </text>
    <text x="50" y="110" font-family="Arial" font-size="22" fill="white" font-weight="800">
      <animate attributeName="y" values="110;100;110" dur="5s" repeatCount="indefinite"/>
      47
    </text>
    <circle cx="162" cy="82" r="8" fill="#10b981" opacity="0.2">
      <animate attributeName="y" values="60;50;60" dur="5s" repeatCount="indefinite"/>
    </circle>
    <text x="162" y="86" font-family="Arial" font-size="9" fill="#10b981" text-anchor="middle">
      <animate attributeName="y" values="86;76;86" dur="5s" repeatCount="indefinite"/>
      ↑18%
    </text>
  </g>

  <!-- Floating stat card 2 -->
  <g filter="url(#softglow)">
    <rect x="30" y="155" width="155" height="70" rx="14" fill="#1e293b" stroke="#10b981" stroke-width="1" opacity="0.9">
      <animate attributeName="y" values="155;165;155" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="50" y="181" font-family="monospace" font-size="10" fill="#64748b">
      <animate attributeName="y" values="181;191;181" dur="6s" repeatCount="indefinite"/>
      REVENUE
    </text>
    <text x="50" y="204" font-family="Arial" font-size="18" fill="#10b981" font-weight="800">
      <animate attributeName="y" values="204;214;204" dur="6s" repeatCount="indefinite"/>
      ₹18,240
    </text>
  </g>

  <!-- CENTRE: Logo + Name -->
  <rect x="370" y="100" width="160" height="100" rx="20" fill="url(#blue)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="4s" repeatCount="indefinite"/>
  </rect>
  <text x="450" y="142" font-family="Arial" font-size="36" fill="white" font-weight="900" text-anchor="middle">KF</text>
  <text x="450" y="175" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="600" letter-spacing="2">KIRANAFLOW</text>

  <!-- Main title -->
  <text x="450" y="56" font-family="Arial" font-size="28" fill="white" font-weight="900" text-anchor="middle" letter-spacing="-0.5">KiranaFlow</text>
  <text x="450" y="80" font-family="Arial" font-size="13" fill="#94a3b8" text-anchor="middle">The operating system for India's kirana stores</text>
  <text x="450" y="238" font-family="Arial" font-size="11" fill="#64748b" text-anchor="middle">WhatsApp Orders · AI Forecasting · Route Optimization · Live Tracking</text>

  <!-- Animated pulse ring -->
  <circle cx="450" cy="150" r="60" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.2">
    <animate attributeName="r" values="60;85;60" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Floating card 3: WhatsApp bot -->
  <g filter="url(#softglow)">
    <rect x="715" y="55" width="160" height="80" rx="14" fill="#1e293b" stroke="#25D366" stroke-width="1" opacity="0.9">
      <animate attributeName="y" values="55;65;55" dur="7s" repeatCount="indefinite"/>
    </rect>
    <rect x="726" y="65" width="70" height="12" rx="6" fill="#25D366" opacity="0.15">
      <animate attributeName="y" values="65;75;65" dur="7s" repeatCount="indefinite"/>
    </rect>
    <text x="731" y="75" font-family="Arial" font-size="8" fill="#25D366">
      <animate attributeName="y" values="75;85;75" dur="7s" repeatCount="indefinite"/>
      📱 WhatsApp Bot
    </text>
    <text x="726" y="95" font-family="Arial" font-size="8" fill="#94a3b8">
      <animate attributeName="y" values="95;105;95" dur="7s" repeatCount="indefinite"/>
      "2 kg atta, 1L tel"
    </text>
    <text x="726" y="109" font-family="Arial" font-size="8" fill="#10b981">
      <animate attributeName="y" values="109;119;109" dur="7s" repeatCount="indefinite"/>
      ✅ Order Confirmed KF-84729
    </text>
  </g>

  <!-- Floating card 4: AI Forecast -->
  <g filter="url(#softglow)">
    <rect x="715" y="160" width="160" height="80" rx="14" fill="#1e293b" stroke="#8b5cf6" stroke-width="1" opacity="0.9">
      <animate attributeName="y" values="160;150;160" dur="9s" repeatCount="indefinite"/>
    </rect>
    <text x="731" y="182" font-family="Arial" font-size="9" fill="#c4b5fd" font-weight="700">
      <animate attributeName="y" values="182;172;182" dur="9s" repeatCount="indefinite"/>
      🤖 AI Forecast
    </text>
    <text x="731" y="198" font-family="Arial" font-size="8" fill="#94a3b8">
      <animate attributeName="y" values="198;188;198" dur="9s" repeatCount="indefinite"/>
      Atta: 120kg / 7d
    </text>
    <rect x="731" y="205" width="60" height="6" rx="3" fill="#334155">
      <animate attributeName="y" values="205;195;205" dur="9s" repeatCount="indefinite"/>
    </rect>
    <rect x="731" y="205" width="18" height="6" rx="3" fill="#ef4444">
      <animate attributeName="y" values="205;195;205" dur="9s" repeatCount="indefinite"/>
    </rect>
    <text x="731" y="224" font-family="Arial" font-size="8" fill="#ef4444" font-weight="700">
      <animate attributeName="y" values="224;214;224" dur="9s" repeatCount="indefinite"/>
      CRITICAL · Restock 80kg
    </text>
  </g>

  <!-- Animated connecting dots -->
  <circle cx="190" cy="100" r="3" fill="#3b82f6">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="250" cy="130" r="3" fill="#3b82f6">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <circle cx="320" cy="110" r="3" fill="#3b82f6">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <circle cx="580" cy="140" r="3" fill="#10b981">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <circle cx="640" cy="110" r="3" fill="#10b981">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  <circle cx="700" cy="130" r="3" fill="#10b981">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>

  <!-- Bottom badges -->
  <rect x="290" y="255" width="80" height="22" rx="11" fill="#1e3a5f"/>
  <text x="330" y="270" font-family="monospace" font-size="9" fill="#60a5fa" text-anchor="middle">Node.js 20</text>
  <rect x="382" y="255" width="80" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="422" y="270" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">React Native</text>
  <rect x="474" y="255" width="80" height="22" rx="11" fill="#2e1065"/>
  <text x="514" y="270" font-family="monospace" font-size="9" fill="#c4b5fd" text-anchor="middle">Claude AI</text>
  <rect x="566" y="255" width="80" height="22" rx="11" fill="#064e3b"/>
  <text x="606" y="270" font-family="monospace" font-size="9" fill="#6ee7b7" text-anchor="middle">PostgreSQL</text>
</svg>
